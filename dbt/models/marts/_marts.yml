version: 2

models:
  - name: dim_team
    description: One row per distinct team (home or away, any league). Grain — team_name.
    columns:
      - name: team_key
        description: Surrogate key hashed from team_name.
        data_tests:
          - not_null
          - unique
      - name: team_name
        description: Team name, as published by the source.
        data_tests:
          - not_null
          - unique

  - name: dim_league
    description: One row per league. Grain — league_code.
    columns:
      - name: league_key
        description: Surrogate key hashed from league_code.
        data_tests:
          - not_null
          - unique
      - name: league_code
        description: "{{ doc('league_code') }}"
        data_tests:
          - not_null
          - unique
      - name: league_name
        description: "{{ doc('league_name') }}"
        data_tests:
          - not_null
      - name: country
        description: "{{ doc('country') }}"
        data_tests:
          - not_null

  - name: dim_season
    description: One row per season present in the match data. Grain — season.
    columns:
      - name: season_key
        description: Surrogate key hashed from season.
        data_tests:
          - not_null
          - unique
      - name: season
        description: "{{ doc('season') }}"
        data_tests:
          - not_null
          - unique
      - name: start_year
        description: Calendar year the season started (e.g. 2024 for '2024/2025'), parsed from season.
        data_tests:
          - not_null
      - name: end_year
        description: Calendar year the season ended (e.g. 2025 for '2024/2025'), parsed from season.
        data_tests:
          - not_null

  - name: dim_date
    description: Calendar date spine, 2016-01-01 through 2026-12-31.
    columns:
      - name: date_key
        description: Surrogate key hashed from date_day.
        data_tests:
          - not_null
          - unique
      - name: date_day
        description: "{{ doc('match_date') }}"
        data_tests:
          - not_null
          - unique
      - name: year
        description: Calendar year of date_day.
        data_tests:
          - not_null
      - name: month
        description: Calendar month of date_day (1-12).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 12
                inclusive: true
      - name: day
        description: Day of month of date_day (1-31).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 31
                inclusive: true
      - name: day_of_week
        description: "ISO day-of-week number for date_day (BigQuery EXTRACT(DAYOFWEEK ...) convention: 1=Sunday...7=Saturday)."
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 7
                inclusive: true
      - name: month_name
        description: Full month name of date_day (e.g. "August").
        data_tests:
          - not_null
      - name: day_name
        description: Full weekday name of date_day (e.g. "Saturday").
        data_tests:
          - not_null

  - name: fact_matches
    description: >
      Star-schema fact table, one row per match. Combines base match outcomes,
      the CLAUDE.md business metrics, odds-implied probability/bookmaker
      overround, and rolling 5-match team form. Power BI and downstream ML
      should only ever read from this mart layer.
    columns:
      - name: match_key
        description: Primary key — one row per match.
        data_tests:
          - not_null
          - unique
      - name: home_team_key
        description: Foreign key to dim_team for the home side.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_key
      - name: away_team_key
        description: Foreign key to dim_team for the away side.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_key
      - name: league_key
        description: Foreign key to dim_league.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_league')
                field: league_key
      - name: date_key
        description: Foreign key to dim_date.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: season_key
        description: Foreign key to dim_season.
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_season')
                field: season_key
      - name: match_time
        description: "{{ doc('match_time') }}"
      - name: referee
        description: "{{ doc('referee') }}"
      - name: full_time_home_goals
        description: "{{ doc('full_time_home_goals') }}"
        data_tests:
          - not_null
      - name: full_time_away_goals
        description: "{{ doc('full_time_away_goals') }}"
        data_tests:
          - not_null
      - name: total_goals
        description: "{{ doc('total_goals') }}"
        data_tests:
          - not_null
      - name: goal_difference
        description: "{{ doc('goal_difference') }}"
      - name: home_points
        description: "{{ doc('home_points') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1, 3]
                quote: false
      - name: away_points
        description: "{{ doc('away_points') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: [0, 1, 3]
                quote: false
      - name: match_result
        description: "{{ doc('match_result') }}"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Home Win', 'Away Win', 'Draw']
      - name: home_win
        description: "{{ doc('home_win') }}"
      - name: away_win
        description: "{{ doc('away_win') }}"
      - name: draw
        description: "{{ doc('draw') }}"
      - name: home_clean_sheet
        description: "{{ doc('home_clean_sheet') }}"
      - name: away_clean_sheet
        description: "{{ doc('away_clean_sheet') }}"
      - name: both_teams_to_score
        description: "{{ doc('both_teams_to_score') }}"
      - name: over_2_5_goals
        description: "{{ doc('over_2_5_goals') }}"
      - name: home_shot_accuracy
        description: "{{ doc('home_shot_accuracy') }}"
      - name: away_shot_accuracy
        description: "{{ doc('away_shot_accuracy') }}"
      - name: home_goal_conversion_rate
        description: "{{ doc('home_goal_conversion_rate') }}"
      - name: away_goal_conversion_rate
        description: "{{ doc('away_goal_conversion_rate') }}"
      - name: bet365_home_odds
        description: "{{ doc('bet365_home_odds') }}"
      - name: bet365_draw_odds
        description: "{{ doc('bet365_draw_odds') }}"
      - name: bet365_away_odds
        description: "{{ doc('bet365_away_odds') }}"
      - name: implied_prob_home
        description: "{{ doc('implied_prob_home') }}"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true
      - name: implied_prob_draw
        description: "{{ doc('implied_prob_draw') }}"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true
      - name: implied_prob_away
        description: "{{ doc('implied_prob_away') }}"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true
      - name: bookmaker_overround
        description: "{{ doc('bookmaker_overround') }}"
      - name: home_form_points_last5
        description: "{{ doc('home_form_points_last5') }}"
      - name: home_form_goals_scored_avg_last5
        description: "{{ doc('home_form_goals_scored_avg_last5') }}"
      - name: home_form_goals_conceded_avg_last5
        description: "{{ doc('home_form_goals_conceded_avg_last5') }}"
      - name: away_form_points_last5
        description: "{{ doc('away_form_points_last5') }}"
      - name: away_form_goals_scored_avg_last5
        description: "{{ doc('away_form_goals_scored_avg_last5') }}"
      - name: away_form_goals_conceded_avg_last5
        description: "{{ doc('away_form_goals_conceded_avg_last5') }}"
