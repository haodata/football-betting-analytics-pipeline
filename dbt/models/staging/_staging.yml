  - name: stg_matches
    description: Union of all 5 league staging models — single standardized matches stream, the only upstream source for intermediate/marts models.
    columns:
      - name: match_id
        description: "{{ doc('match_id') }}"
        data_tests:
          - not_null
          - unique
      - name: league_code
        description: "{{ doc('league_code') }}"
